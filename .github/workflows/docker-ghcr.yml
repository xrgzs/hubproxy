name: ghcr镜像构建
on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如: v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Go build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('src/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version from input
        run: |
          VERSION=${{ github.event.inputs.version }}
          if [[ $VERSION == v* ]]; then
            VERSION=${VERSION:1}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Convert repository name to lowercase
        run: |
          # 将 github.repository 整体转换为小写
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV

      - name: Build release binaries
        working-directory: src
        run: |
          mkdir -p ../dist
          cp config.toml ../dist/config.toml

          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build \
              -trimpath \
              -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
              -o ../dist/hubproxy-linux-$arch .
          done

      - name: Build and push Docker image
        run: |
          docker buildx build --push \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ env.REPO_LOWER }}:${{ env.VERSION }} \
            --tag ghcr.io/${{ env.REPO_LOWER }}:latest \
            -f Dockerfile .
        env:
          GHCR_PUBLIC: true
